<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicios-MR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="js/script.js" defer></script>

</head>

<body>
    <nav class="navbar navbar-dark bg-primary px-3">
        <a href="index.html" class="navbar-brand">← Voltar</a>
    </nav>

    <div class="container text-center mt-4">

        <h2>Respiração Guiada</h2>

        <div id="circulo" class="circulo">Respire</div>

        <h2 id="contador">0</h2>

        <audio id="somRelaxante" loop>
            <source src="audio/relaxante.mp3" type="audio/mpeg">
        </audio>

        <button class="btn btn-success mt-3" onclick="toggleSom()">🎵 Som</button>

        <div class="mt-3">
            <button class="btn btn-secondary btn-respiracao" onclick="selecionarRespiracao(this, 4,4,4)">
                4-4-4
            </button>

            <button class="btn btn-secondary btn-respiracao" onclick="selecionarRespiracao(this, 4,7,8)">
                4-7-8
            </button>
        </div>

        <button class="btn btn-danger mt-3" onclick="pararRespiracao()">Parar</button>

    </div>
</body>

</html>
